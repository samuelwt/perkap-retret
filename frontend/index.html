<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- width=device-width + initial-scale=1 is what makes the page render
         at phone size instead of a zoomed-out "desktop site" on mobile. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perkap Retret</title>
    <!-- Google's sign-in library. It attaches window.google.accounts.id,
         which Login.jsx uses to render the real "Sign in with Google"
         button and receive a verified ID token. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Pairs with public/404.html. If you landed here via that redirect
         (URL contains "?/" as a marker), this rewrites the address bar
         back to the real intended path — e.g. /trip-inventory/admin —
         using history.replaceState, WITHOUT reloading the page. This
         must run before React Router initializes below, or React Router
         will read the wrong (redirected) URL and render the wrong route. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
